listen=YES
listen_ipv6=NO

# Misconfiguration: no chroot — andrew can traverse the filesystem
chroot_local_user=NO
chroot_list_enable=NO

local_enable=YES
# Read-only: no write allowed for any user
write_enable=NO
local_umask=022

dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

anonymous_enable=NO

pam_service_name=vsftpd
userlist_enable=YES
userlist_file=/etc/vsftpd.userlist
userlist_deny=NO

# Passive mode ports
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
pasv_address=127.0.0.1
pasv_addr_resolve=NO

# Ensure vsftpd secure_chroot_dir exists
secure_chroot_dir=/var/run/vsftpd/empty

ftpd_banner=Welcome to LabSrv FTP service.
