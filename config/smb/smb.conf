[global]
   workgroup = WORKGROUP
   server string = Lab File Server
   netbios name = LABSRV
   security = user
   map to guest = Bad User
   dns proxy = no
   log level = 1
   max log size = 1000

   # Enable SMBv1 so nmap scripts work (intentional for lab)
   min protocol = NT1
   max protocol = SMB3

# Anonymous read-only share — intentionally misconfigured
[Shared]
   path = /srv/smb/Shared
   browsable = yes
   writable = no
   guest ok = yes
   guest only = yes
   read only = yes
   comment = Company shared documents
